services:
  db:
    image: postgres:16
    container_name: rentaequip_db
    environment:
      POSTGRES_DB: rentaequip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rentaequip_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: rentaequip_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: rentaequip_celery
    command: celery -A celery_worker worker --beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: